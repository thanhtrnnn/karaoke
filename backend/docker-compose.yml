services:
  postgres:
    image: postgres:16
    container_name: karaoke-postgres
    environment:
      POSTGRES_DB: karaoke
      POSTGRES_USER: karaoke
      POSTGRES_PASSWORD: karaoke
    ports:
      - "5432:5432"
    volumes:
      - karaoke-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: karaoke-redis
    ports:
      - "6379:6379"

volumes:
  karaoke-postgres-data:
