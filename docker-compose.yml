services:
  postgres:
    image: postgres:16
    container_name: karaoke-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-karaoke}
      POSTGRES_USER: ${POSTGRES_USER:-karaoke_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Secur3Passw0rd!}
    ports:
      - "5432:5432"
    volumes:
      - karaoke-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karaoke_admin} -d ${POSTGRES_DB:-karaoke}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: karaoke-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: karaoke-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@karaoke.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karaoke-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-karaoke}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-karaoke_admin}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-Secur3Passw0rd!}
      - SPRING_REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karaoke-frontend
    ports:
      - "6969:80"
    depends_on:
      - backend

volumes:
  karaoke-postgres-data:
