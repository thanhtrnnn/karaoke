services:
  postgres:
    image: postgres:16
    container_name: karaoke-postgres
    environment:
      POSTGRES_DB: karaoke
      POSTGRES_USER: karaoke
      POSTGRES_PASSWORD: karaoke
    ports:
      - "5432:5432"
    volumes:
      - karaoke-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karaoke -d karaoke"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: karaoke-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karaoke-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/karaoke
      - SPRING_DATASOURCE_USERNAME=karaoke
      - SPRING_DATASOURCE_PASSWORD=karaoke
      - SPRING_REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karaoke-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  karaoke-postgres-data:
